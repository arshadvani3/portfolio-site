<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Arsh Advani — MSCS @ UCSC, AI Systems Engineer</title>
<meta name="description" content="Portfolio of Arsh Advani — M.S. Computer Science @ UC Santa Cruz, building agentic systems, production RAG, and the infra behind them." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* ─── Tokens ──────────────────────────────────────────────── */
  :root {
    --bg:        #0a0a0c;
    --bg-alt:    #111114;
    --bg-card:   #131318;
    --fg:        #fafafa;
    --fg-2:      #d4d4d8;
    --fg-3:      #a1a1aa;
    --fg-4:      #71717a;
    --line:      rgba(255, 255, 255, 0.08);
    --line-2:    rgba(255, 255, 255, 0.04);
    --line-hi:   rgba(255, 255, 255, 0.16);

    /* Accent — overridden by JS based on tweak */
    --accent:        #f59e0b;
    --accent-2:      #c2410c;
    --accent-soft:   rgba(245, 158, 11, 0.14);
    --accent-glow:   rgba(245, 158, 11, 0.35);
    --accent-ring:   rgba(245, 158, 11, 0.55);

    --font-display:  "Syne", "Inter", system-ui, sans-serif;
    --font-body:     "Inter", system-ui, -apple-system, sans-serif;
    --font-mono:     "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    --pad-x: clamp(20px, 5vw, 64px);
    --radius: 18px;
    --radius-sm: 10px;
    --radius-pill: 100px;

    --t-fast: 0.2s cubic-bezier(.4, 0, .2, 1);
    --t-norm: 0.35s cubic-bezier(.4, 0, .2, 1);
    --t-slow: 0.7s cubic-bezier(.22, 1, .36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scroll-padding-top: 96px; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: var(--accent-soft); color: var(--fg); }

  h1, h2, h3, h4 {
    font-family: var(--font-display);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.025em;
  }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 2px; }

  /* ─── Atmospheric layers ──────────────────────────────────── */
  .noise {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  @media (max-width: 900px), (pointer: coarse) {}

  /* ─── Layout ──────────────────────────────────────────────── */
  .wrap {
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 var(--pad-x);
  }
  .section { padding: clamp(72px, 12vw, 140px) 0; position: relative; }
  .section--alt { background: var(--bg-alt); }

  /* Section header */
  .sec-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 18px;
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }
  .sec-eyebrow::before {
    content: ""; width: 18px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }
  .sec-title {
    font-size: clamp(36px, 5.5vw, 56px);
    margin-bottom: 18px;
  }
  .sec-sub {
    font-size: clamp(15px, 1.2vw, 17px);
    color: var(--fg-3);
    max-width: 56ch;
    margin-bottom: 56px;
  }

  /* ─── Nav ─────────────────────────────────────────────────── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 60;
    padding: 16px 0;
    transition: padding var(--t-norm);
  }
  header.scrolled { padding: 10px 0; }

  .nav-bar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 24px;
    padding: 12px 12px 12px 20px;
    border-radius: var(--radius-pill);
    background: rgba(10, 10, 12, 0.55);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--line);
  }
  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.04em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .logo .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .logo .logo-mark {
    height: 22px;
    width: auto;
    color: var(--fg);
    display: block;
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-family: var(--font-body);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--fg-3);
    position: relative;
    padding: 6px 2px;
    transition: color var(--t-fast);
  }
  .nav-links a::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1.5px; background: var(--accent);
    transform: scaleX(0); transform-origin: right;
    transition: transform var(--t-norm);
  }
  .nav-links a:hover, .nav-links a.active { color: var(--fg); }
  .nav-links a:hover::after, .nav-links a.active::after {
    transform: scaleX(1); transform-origin: left;
  }
  .nav-cta {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-pill);
    background: var(--accent);
    color: #0a0a0c;
    transition: transform var(--t-fast), box-shadow var(--t-fast);
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
  .menu-btn {
    display: none; background: transparent; border: 0;
    color: var(--fg); font-size: 22px; cursor: pointer;
    width: 40px; height: 40px;
  }
  @media (max-width: 800px) {
    .nav-links, .nav-cta { display: none; }
    .menu-btn { display: grid; place-items: center; }
    .nav-bar.open .nav-links {
      display: flex;
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      flex-direction: column;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 22px;
    }
    .nav-bar.open .nav-cta { display: inline-flex; margin-top: 8px; align-self: flex-start; }
  }

  /* ─── Buttons ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 13px 22px;
    border-radius: var(--radius-pill);
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform var(--t-fast), background var(--t-fast), box-shadow var(--t-fast), border-color var(--t-fast);
  }
  .btn-primary { background: var(--accent); color: #0a0a0c; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px var(--accent-glow); }
  .btn-ghost { background: transparent; color: var(--fg); border-color: var(--line-hi); }
  .btn-ghost:hover { transform: translateY(-2px); border-color: var(--fg-3); background: rgba(255,255,255,0.03); }
  .btn .arr { transition: transform var(--t-fast); }
  .btn:hover .arr { transform: translate(2px, -2px); }

  /* ─── Hero ────────────────────────────────────────────────── */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center;
    position: relative;
    overflow: hidden;
    padding-top: 120px;
  }
  .hero-glow {
    position: absolute; inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 50% 60% at 50% 35%, var(--accent-soft) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 20% 100%, color-mix(in oklab, var(--accent) 12%, transparent) 0%, transparent 60%);
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: scale(1) translate(0, 0); opacity: 0.85; }
    100% { transform: scale(1.08) translate(-2%, 2%); opacity: 1; }
  }

  .hero-inner { position: relative; z-index: 1; width: 100%; }
  .hero-prelude {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--fg-3);
    padding: 6px 14px 6px 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.025);
    backdrop-filter: blur(6px);
    margin-bottom: 32px;
  }
  .hero-prelude .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #10b981;
    position: relative;
  }
  .hero-prelude .pulse::after {
    content: "";
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1.5px solid #10b981;
    animation: ring 2s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  #hero h1 {
    font-size: clamp(32px, 5.5vw, 68px);
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 1.05;
    margin-bottom: 32px;
  }
  #hero h1 .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 700;
  }
  #hero h1 .line {
    display: block;
    white-space: normal;
    opacity: 0;
    transform: translateY(40px);
    animation: rise 0.9s cubic-bezier(.22, 1, .36, 1) forwards;
  }
  #hero h1 .line:nth-child(1) { animation-delay: 0.15s; }
  #hero h1 .line:nth-child(2) { animation-delay: 0.30s; }
  #hero h1 .line:nth-child(3) { animation-delay: 0.45s; }
  @media (max-width: 560px) {
    #hero h1 { font-size: clamp(34px, 10vw, 56px); }
    #hero h1 .line { white-space: normal; }
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  #hero p.lede {
    font-size: clamp(17px, 1.5vw, 21px);
    color: var(--fg-3);
    max-width: 56ch;
    line-height: 1.55;
    margin-bottom: 40px;
    opacity: 0; transform: translateY(20px);
    animation: rise 0.9s cubic-bezier(.22, 1, .36, 1) 0.65s forwards;
  }
  #hero .ctas {
    display: flex; gap: 12px; flex-wrap: wrap;
    opacity: 0; transform: translateY(20px);
    animation: rise 0.9s cubic-bezier(.22, 1, .36, 1) 0.8s forwards;
  }

  .hero-meta {
    margin-top: 64px;
    display: flex; gap: 32px;
    flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--fg-4);
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.22, 1, .36, 1) 1s forwards;
  }
  .hero-meta .hm { display: flex; flex-direction: column; gap: 4px; }
  .hero-meta .hm-l { color: var(--fg-4); letter-spacing: 0.04em; }
  .hero-meta .hm-v { color: var(--fg-2); font-family: var(--font-body); font-size: 14px; }

  /* ─── About ───────────────────────────────────────────────── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: clamp(32px, 5vw, 72px);
    align-items: start;
  }
  @media (max-width: 880px) { .about-grid { grid-template-columns: 1fr; } }

  .about-photo {
    position: relative;
    aspect-ratio: 4 / 5;
    border-radius: var(--radius);
    overflow: hidden;
    background: linear-gradient(135deg, var(--accent-soft), var(--bg-alt));
    border: 1px solid var(--line);
  }
  .about-photo image-slot {
    width: 100%; height: 100%;
    --is-bg: transparent;
    --is-fg: var(--fg-3);
    --is-border: transparent;
  }
  .about-photo .badge {
    position: absolute;
    left: 16px; bottom: 16px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px 8px 12px;
    background: rgba(10, 10, 12, 0.72);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    font-size: 12px;
    color: #10b981;
    font-weight: 500;
  }
  .about-photo .badge .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: #10b981; position: relative;
  }
  .about-photo .badge .pulse::after {
    content: ""; position: absolute; inset: -4px;
    border-radius: 50%; border: 1.5px solid #10b981;
    animation: ring 2s ease-out infinite;
  }

  .about-body p {
    color: var(--fg-3);
    font-size: 17px;
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .about-body p strong, .about-body p a {
    color: var(--fg);
    font-weight: 500;
  }
  .about-body p a { border-bottom: 1px solid var(--accent); transition: color var(--t-fast); }
  .about-body p a:hover { color: var(--accent); }

  .skills-block { margin-top: 40px; display: flex; flex-direction: column; gap: 26px; }
  .skill-cat h4 {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 12px;
    color: var(--fg-4);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }
  .skill-cat h4::before { content: "// "; color: var(--fg-4); opacity: 0.5; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    color: var(--fg-2);
    transition: all var(--t-fast);
  }
  .chip:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--fg);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px color-mix(in oklab, var(--accent) 20%, transparent);
  }

  /* ─── Experience timeline ─────────────────────────────────── */
  .timeline {
    position: relative;
    max-width: 820px;
  }
  .timeline::before {
    content: "";
    position: absolute; top: 8px; bottom: 8px; left: 11px;
    width: 1.5px;
    background: linear-gradient(to bottom, var(--accent) 0%, var(--line) 30%, var(--line) 100%);
  }
  .tl-item { position: relative; padding-left: 48px; margin-bottom: 32px; }
  .tl-item:last-child { margin-bottom: 0; }
  .tl-dot {
    position: absolute; left: 4px; top: 22px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--bg-alt);
    border: 2px solid var(--accent);
    box-shadow: 0 0 0 6px color-mix(in oklab, var(--bg-alt) 100%, transparent), 0 0 16px var(--accent-glow);
  }
  .tl-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px 26px;
    transition: border-color var(--t-fast), transform var(--t-fast);
  }
  .tl-card:hover { border-color: var(--line-hi); transform: translateY(-2px); }
  .tl-head {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 8px;
    margin-bottom: 4px;
  }
  .tl-role {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 18px;
    color: var(--fg);
    letter-spacing: -0.02em;
  }
  .tl-when {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--fg-3);
    background: rgba(255,255,255,0.04);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .tl-where { color: var(--accent); font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .tl-bullets li {
    color: var(--fg-3);
    font-size: 14.5px;
    line-height: 1.65;
    padding-left: 18px;
    position: relative;
    margin-bottom: 8px;
  }
  .tl-bullets li::before {
    content: "▹";
    position: absolute; left: 0;
    color: var(--accent);
    font-family: var(--font-mono);
  }

  /* ─── Projects bento ──────────────────────────────────────── */
  .bento {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 18px;
  }
  .proj {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--line);
    display: flex; flex-direction: column;
    transition: transform var(--t-norm), border-color var(--t-norm);
  }
  .proj:hover { transform: translateY(-4px); border-color: var(--line-hi); }
  .proj-art {
    flex: 1; min-height: 200px;
    position: relative;
    overflow: hidden;
  }
  .proj-art::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(10,10,12,0.5) 100%);
  }
  .proj-art .glyph {
    position: absolute;
    bottom: 16px; left: 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.06em;
    z-index: 1;
    text-transform: uppercase;
  }

  .art-1 { background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 50%, #818cf8 100%); }
  .art-2 { background: linear-gradient(135deg, #042f2e 0%, #0f766e 50%, #5eead4 100%); }
  .art-3 { background: linear-gradient(135deg, #500724 0%, #be185d 50%, #f9a8d4 100%); }

  /* Bento layout (3 projects) */
  .proj:nth-child(1) { grid-column: span 12; }
  .proj:nth-child(2), .proj:nth-child(3) { grid-column: span 6; }
  @media (min-width: 960px) {
    .proj:nth-child(1) { grid-column: span 7; grid-row: span 2; }
    .proj:nth-child(2) { grid-column: span 5; }
    .proj:nth-child(3) { grid-column: span 5; }
    .proj:nth-child(1) .proj-art { min-height: 340px; }
  }
  @media (max-width: 640px) {
    .proj:nth-child(2), .proj:nth-child(3) { grid-column: span 12; }
  }

  .proj-body {
    padding: 24px 26px 26px;
    border-top: 1px solid var(--line);
  }
  .proj-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .proj-tags span {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .proj-tags span + span::before {
    content: "·";
    color: var(--fg-4); margin-right: 6px;
  }
  .proj-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(22px, 2vw, 28px);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    color: var(--fg);
  }
  .proj-desc {
    color: var(--fg-3);
    font-size: 14.5px;
    line-height: 1.6;
    margin-bottom: 18px;
  }
  .proj-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--fg);
    transition: color var(--t-fast);
  }
  .proj-link .arr { transition: transform var(--t-fast); }
  .proj:hover .proj-link { color: var(--accent); }
  .proj:hover .proj-link .arr { transform: translate(3px, -3px); }

  /* ─── Education ───────────────────────────────────────────── */
  .edu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  @media (max-width: 720px) { .edu-grid { grid-template-columns: 1fr; } }
  .edu-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 26px 28px;
    transition: border-color var(--t-fast), transform var(--t-fast);
  }
  .edu-card:hover { border-color: var(--line-hi); transform: translateY(-2px); }
  .edu-when {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--fg-4);
    letter-spacing: 0.04em;

    transition: border-color var(--t-fast);
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field label {

    pointer-events: none;
    transition: all var(--t-fast);
  }
  .field input:focus ~ label,
  .field input:not(:placeholder-shown) ~ label,
  .field textarea:focus ~ label,
  .field textarea:not(:placeholder-shown) ~ label {

  /* ─── Footer ──────────────────────────────────────────────── */

  /* ─── Reveal ──────────────────────────────────────────────── */
  .reveal {

  @media (prefers-reduced-motion: reduce) {

    #hero h1 .line, #hero p.lede, #hero .ctas, .hero-meta { opacity: 1 !important; transform: none !important; }
  }
